# ============================================================
# 亮品牌 · 一键部署配置
# 使用方法: docker-compose up -d
# ============================================================

services:
  liangbrand:
    build: .
    container_name: liangbrand-system
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-please}
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/data/uploads
      # AI 模型配置（按需填入实际 API Key）
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_REASONING_MODEL=${DEEPSEEK_REASONING_MODEL:-deepseek-reasoner}
      - DEEPSEEK_ENABLED=${DEEPSEEK_ENABLED:-true}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_ENABLED=${DOUBAO_ENABLED:-false}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_ENABLED=${QWEN_ENABLED:-false}
    volumes:
      # 数据持久化：SQLite 数据库文件
      - liangbrand-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3001}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  liangbrand-data:
    driver: local
