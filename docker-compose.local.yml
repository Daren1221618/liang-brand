# ============================================================
# 亮品牌 · 本机 Docker 部署配置
# 使用方法: docker compose -f docker-compose.local.yml up -d
# ============================================================

services:
  liangbrand:
    build: .
    container_name: liangbrand-local
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    volumes:
      # 数据持久化：SQLite + 上传文件 → 宿主机 ./data 目录
      - ./data:/app/data
      # 开发时也可挂载 dist（首次需构建）
      # - ./dist:/app/dist
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
